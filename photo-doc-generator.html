<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>

<style>
  :root{
    --paper:#F6F4EE;
    --card:#FFFFFF;
    --ink:#2B2B28;
    --ink-soft:#6B675F;
    --navy:#223A52;
    --navy-soft:#3E5872;
    --maroon:#8B2E2E;
    --gold:#C9A24B;
    --line:#E1DCCF;
    --line-strong:#C8C2B2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",-apple-system,sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:28px 18px 120px;}

  .app-header{margin-bottom:22px;}
  .eyebrow{
    font-size:12px;letter-spacing:.18em;color:var(--maroon);
    font-weight:700;text-transform:uppercase;margin:0 0 6px;
  }
  .app-header h1{
    font-size:24px;margin:0 0 8px;color:var(--navy);
    border-bottom:3px solid var(--maroon);
    padding-bottom:10px;
    line-height:1.4;
  }
  .app-header p{margin:8px 0 0;color:var(--ink-soft);font-size:14px;line-height:1.7;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px;
    margin-bottom:16px;
  }
  .card h2{
    font-size:15px;margin:0 0 12px;color:var(--navy);
    display:flex;align-items:center;gap:8px;
  }
  .card h2 .num{
    display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:50%;
    background:var(--navy);color:#fff;font-size:12px;font-weight:700;flex-shrink:0;
  }

  label.field-label{
    display:block;font-size:13px;color:var(--ink-soft);margin-bottom:6px;font-weight:600;
  }
  input[type="text"], textarea{
    width:100%;
    border:1px solid var(--line-strong);
    border-radius:8px;
    padding:10px 12px;
    font-size:14px;
    font-family:inherit;
    background:#FCFBF8;
    color:var(--ink);
  }
  input[type="text"]:focus, textarea:focus{
    outline:2px solid var(--navy-soft);
    outline-offset:1px;
    border-color:var(--navy-soft);
  }
  textarea{resize:vertical;min-height:54px;line-height:1.6;}

  .layout-options{display:flex;gap:10px;}
  .layout-opt{
    flex:1;border:1px solid var(--line-strong);border-radius:8px;
    padding:10px;text-align:center;cursor:pointer;font-size:13px;color:var(--ink-soft);
    transition:.15s;
  }
  .layout-opt.active{
    border-color:var(--navy);background:#EEF2F6;color:var(--navy);font-weight:700;
  }
  .layout-opt .mini-grid{
    display:grid;gap:3px;margin:0 auto 6px;width:60px;height:42px;
  }
  .layout-opt .mini-grid div{background:var(--line-strong);border-radius:2px;}
  .layout-opt.active .mini-grid div{background:var(--navy-soft);}

  .block{
    border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;
    background:#FCFBF8;position:relative;
  }
  .block-head{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;
  }
  .block-head .tag{
    font-size:12px;color:#fff;background:var(--navy-soft);
    padding:2px 8px;border-radius:12px;font-weight:700;
  }
  .block-actions{display:flex;gap:6px;}
  .icon-btn{
    border:1px solid var(--line-strong);background:#fff;border-radius:6px;
    width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;color:var(--ink-soft);font-size:14px;line-height:1;
  }
  .icon-btn:hover{border-color:var(--navy-soft);color:var(--navy);}
  .icon-btn.danger:hover{border-color:var(--maroon);color:var(--maroon);}

  .text-btn{
    display:inline-block;border:none;background:none;color:var(--ink-soft);
    font-size:12px;text-decoration:underline;cursor:pointer;padding:0;font-family:inherit;
  }
  .text-btn:hover{color:var(--maroon);}

  .photo-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px;}
  .photo-preview{
    width:96px;height:96px;border:1px dashed var(--line-strong);border-radius:8px;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    background:#fff;flex-shrink:0;color:var(--ink-soft);font-size:11px;text-align:center;
  }
  .photo-preview img{width:100%;height:100%;object-fit:cover;}
  .upload-col{flex:1;}
  .upload-btn{
    display:inline-block;border:1px solid var(--navy-soft);color:var(--navy);
    background:#fff;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:600;
  }
  .upload-btn:hover{background:#EEF2F6;}
  .file-name{font-size:12px;color:var(--ink-soft);margin-top:6px;word-break:break-all;}

  .add-block-btn{
    width:100%;border:1.5px dashed var(--navy-soft);color:var(--navy);
    background:#EEF2F6;border-radius:8px;padding:12px;font-size:14px;font-weight:700;
    cursor:pointer;
  }
  .add-block-btn:hover{background:#E3E9EF;}

  /* preview */
  .preview-page{
    border:1px solid var(--line-strong);background:#fff;border-radius:6px;
    padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.04);
  }
  .preview-header{
    display:flex;align-items:center;gap:12px;
    border-bottom:2px solid var(--maroon);padding-bottom:8px;margin-bottom:10px;
  }
  .preview-header img{
    max-height:48px;max-width:130px;object-fit:contain;flex-shrink:0;
  }
  .preview-title{
    flex:1;text-align:center;font-weight:700;font-size:14px;color:var(--navy);
  }
  .preview-grid{display:grid;gap:8px;}
  .preview-grid.grid-c1{grid-template-columns:1fr;}
  .preview-grid.grid-c2{grid-template-columns:1fr 1fr;}
  .preview-grid.grid-c3{grid-template-columns:1fr 1fr 1fr;}
  .preview-cell{border:1px solid var(--line);border-radius:4px;overflow:hidden;}
  .preview-photo{
    aspect-ratio:4/3;background:#F0EEE8;display:flex;align-items:center;
    justify-content:center;color:#B6B0A0;font-size:11px;overflow:hidden;
  }
  .preview-photo img{width:100%;height:100%;object-fit:cover;}
  .preview-caption{
    font-size:11px;color:var(--ink-soft);padding:5px 7px;border-top:1px solid var(--line);
    min-height:1.6em;line-height:1.5;word-break:break-all;
  }
  .preview-cell.split{display:flex;align-items:stretch;}
  .preview-cell.split .preview-photo{aspect-ratio:auto;flex:0 0 68%;}
  .preview-cell.split .preview-caption{
    flex:1;border-top:none;border-left:1px solid var(--line);
  }
  .empty-hint{
    text-align:center;color:var(--ink-soft);font-size:13px;padding:30px 10px;
  }

  /* bottom bar */
  .bottom-bar{
    position:fixed;left:0;right:0;bottom:0;
    background:rgba(246,244,238,.92);backdrop-filter:blur(6px);
    border-top:1px solid var(--line);
    padding:12px 18px;display:flex;justify-content:center;gap:10px;
    z-index:10;
  }
  .bottom-bar .inner{max-width:760px;width:100%;display:flex;gap:10px;align-items:center;}
  .primary-btn{
    flex:1;background:var(--navy);color:#fff;border:none;border-radius:8px;
    padding:13px 20px;font-size:15px;font-weight:700;cursor:pointer;
    font-family:inherit;
  }
  .primary-btn:hover{background:var(--navy-soft);}
  .primary-btn:disabled{background:#B9B6AD;cursor:not-allowed;}
  .status-msg{font-size:12px;color:var(--ink-soft);min-width:120px;text-align:right;}
  .status-msg.error{color:var(--maroon);}
  .status-msg.ok{color:#2E7D4F;}
</style>

<div class="wrap">
  <div class="app-header">
    <p class="eyebrow">體育班評鑑文件工具・模組一</p>
    <h1>照片佐證資料產生器</h1>
    <p>
      輸入文件標題，選擇每列要放幾張照片，逐一新增「照片＋說明」區塊，
      完成後按下方「下載 Word 檔」即可產生排版好的 .docx 檔，貼到評鑑資料中。
    </p>
  </div>

  <div class="card">
    <h2><span class="num">1</span>文件標題與頁首</h2>
    <label class="field-label" for="docTitle">大標題文字（會顯示在 Word 文件最上方）</label>
    <input type="text" id="docTitle" placeholder="例如：113學年度體育班田徑組訓練日誌(五年級)">

    <label class="field-label" style="margin-top:14px;">學校 LOGO（選填，會顯示在標題左側，如同頁首樣式）</label>
    <div class="photo-row" style="margin-bottom:0;">
      <div class="photo-preview" id="logoPreview" style="width:96px;height:64px;">尚未選擇</div>
      <div class="upload-col">
        <label class="upload-btn">
          選擇LOGO圖片
          <input type="file" accept="image/*" style="display:none" onchange="onLogoChange(this)">
        </label>
        <div class="file-name" id="logoFileName">尚未上傳，標題將維持單獨置中</div>
        <span class="text-btn" style="margin-top:8px;display:none;" id="logoClearBtn" onclick="clearLogo()">移除LOGO</span>
      </div>
    </div>
  </div>

  <div class="card">
    <h2><span class="num">2</span>每列照片數量</h2>
    <div class="layout-options">
      <div class="layout-opt active" data-preset="1" onclick="setLayout(1)">
        <div class="mini-grid" style="grid-template-columns:1fr;grid-template-rows:1fr;width:40px;height:42px;">
          <div></div>
        </div>
        每列 1 張（大圖）
      </div>
      <div class="layout-opt" data-preset="2" onclick="setLayout(2)">
        <div class="mini-grid" style="grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;">
          <div></div><div></div><div></div><div></div>
        </div>
        每列 2 張（2排）
      </div>
      <div class="layout-opt" data-preset="3" onclick="setLayout(3)">
        <div class="mini-grid" style="grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr;">
          <div></div><div></div><div></div><div></div><div></div><div></div>
        </div>
        每列 2 張（3排）
      </div>
      <div class="layout-opt" data-preset="4" onclick="setLayout(4)">
        <div class="mini-grid" style="grid-template-columns:1fr;grid-template-rows:1fr 1fr;width:40px;height:42px;">
          <div></div><div></div>
        </div>
        每頁 2 張（大圖）
      </div>
    </div>
  </div>

  <div class="card">
    <h2><span class="num">3</span>照片與說明</h2>
    <div id="blocksContainer"></div>
    <button class="add-block-btn" onclick="addBlock()">＋ 新增照片區塊</button>
  </div>

  <div class="card">
    <h2><span class="num">4</span>預覽（與 Word 排版相近）</h2>
    <div class="preview-page">
      <div class="preview-header" id="previewHeader">
        <img id="previewLogo" style="display:none;" />
        <div class="preview-title" id="previewTitle">（尚未輸入標題）</div>
      </div>
      <div class="preview-grid grid-c1" id="previewGrid">
        <div class="empty-hint">尚未新增任何照片區塊</div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="inner">
    <span class="status-msg" id="statusMsg"></span>
    <button class="primary-btn" id="downloadBtn" onclick="generateDocx()">下載 Word 檔 (.docx)</button>
  </div>
</div>

const DEFAULT_LOGO_WIDTH = 800;
const DEFAULT_LOGO_HEIGHT = 193;

let cols = 1;
let targetBlocks = 1;
let blocks = []; // {id, file, dataUrl, width, height, caption}
let nextId = 1;
let logo = null; // {file, dataUrl, width, height}
let splitCaption = false; // true：說明文字獨立成一個欄位（照片欄｜說明欄並排），而非疊在同一格內

// Layout presets: 1=1x1（每列1張・大圖）、2=2x2（每列2張・2排）、3=2x3（每列2張・3排）、
//                4=1x2（每頁2張・大圖，照片與說明各自獨立欄位並排，參考班級日誌照片格式）
const LAYOUT_PRESETS = {
  1: {cols: 1, blocks: 1},
  2: {cols: 2, blocks: 4},
  3: {cols: 2, blocks: 6},
  4: {cols: 1, blocks: 2, splitCaption: true},
};

function setLayout(presetId){
  const preset = LAYOUT_PRESETS[presetId];
  cols = preset.cols;
  targetBlocks = preset.blocks;
  splitCaption = !!preset.splitCaption;
  document.querySelectorAll('.layout-opt').forEach(el=>{
    el.classList.toggle('active', parseInt(el.dataset.preset)===presetId);
  });
  const isEmpty = (b) => !b.file && !(b.caption && b.caption.trim());
  // trim trailing empty blocks down to the target count
  while(blocks.length > targetBlocks && isEmpty(blocks[blocks.length-1])){
    blocks.pop();
  }
  // pad up to the target count with empty blocks
  while(blocks.length < targetBlocks){
    blocks.push({id: nextId++, file:null, dataUrl:null, width:0, height:0, caption:''});
  }
  renderBlocks();
  renderPreview();
}

function onLogoChange(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      logo = {file, dataUrl: e.target.result, width: img.naturalWidth, height: img.naturalHeight};
      const preview = document.getElementById('logoPreview');
      preview.innerHTML = `<img src="${e.target.result}">`;
      document.getElementById('logoFileName').textContent = file.name;
      document.getElementById('logoClearBtn').style.display = 'inline-block';
      renderPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearLogo(){
  logo = null;
  document.getElementById('logoPreview').innerHTML = '尚未選擇';
  document.getElementById('logoFileName').textContent = '尚未上傳，標題將維持單獨置中';
  document.getElementById('logoClearBtn').style.display = 'none';
  renderPreview();
}

function addBlock(){
  blocks.push({id: nextId++, file:null, dataUrl:null, width:0, height:0, caption:''});
  renderBlocks();
  renderPreview();
}

function removeBlock(id){
  blocks = blocks.filter(b=>b.id!==id);
  renderBlocks();
  renderPreview();
}

function moveBlock(id, dir){
  const idx = blocks.findIndex(b=>b.id===id);
  const newIdx = idx+dir;
  if(newIdx<0 || newIdx>=blocks.length) return;
  [blocks[idx], blocks[newIdx]] = [blocks[newIdx], blocks[idx]];
  renderBlocks();
  renderPreview();
}

function onPhotoChange(id, input){
  const file = input.files && input.files[0];
  if(!file) return;
  const b = blocks.find(x=>x.id===id);
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      b.file = file;
      b.dataUrl = e.target.result;
      b.width = img.naturalWidth;
      b.height = img.naturalHeight;
      renderBlocks();
      renderPreview();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function onCaptionChange(id, val){
  const b = blocks.find(x=>x.id===id);
  b.caption = val;
  renderPreview();
}

function renderBlocks(){
  const container = document.getElementById('blocksContainer');
  if(blocks.length===0){
    container.innerHTML = '<p style="color:var(--ink-soft);font-size:13px;margin:6px 0 14px;">目前沒有任何區塊，點選下方按鈕新增第一個「照片＋說明」。</p>';
    return;
  }
  container.innerHTML = blocks.map((b,i)=>`
    <div class="block">
      <div class="block-head">
        <span class="tag">區塊 ${i+1}</span>
        <div class="block-actions">
          <span class="icon-btn" onclick="moveBlock(${b.id},-1)" title="上移">↑</span>
          <span class="icon-btn" onclick="moveBlock(${b.id},1)" title="下移">↓</span>
          <span class="icon-btn danger" onclick="removeBlock(${b.id})" title="刪除">✕</span>
        </div>
      </div>
      <div class="photo-row">
        <div class="photo-preview">
          ${b.dataUrl ? `<img src="${b.dataUrl}">` : '尚未選擇照片'}
        </div>
        <div class="upload-col">
          <label class="upload-btn">
            選擇照片
            <input type="file" accept="image/*" style="display:none" onchange="onPhotoChange(${b.id}, this)">
          </label>
          <div class="file-name">${b.file ? b.file.name : '尚未上傳，產生時將顯示「尚未上傳照片」'}</div>
        </div>
      </div>
      <label class="field-label">說明文字（會自動加上「說明：」）</label>
      <textarea placeholder="例如：學生王小明 113年10/7~10/11 訓練日誌" oninput="onCaptionChange(${b.id}, this.value)">${b.caption}</textarea>
    </div>
  `).join('');
}

function renderPreview(){
  const title = document.getElementById('docTitle').value.trim();
  document.getElementById('previewTitle').textContent = title || '（尚未輸入標題）';

  const logoImg = document.getElementById('previewLogo');
  if(logo){
    logoImg.src = logo.dataUrl;
    logoImg.style.display = 'block';
  } else {
    logoImg.style.display = 'none';
  }

  const grid = document.getElementById('previewGrid');
  grid.className = 'preview-grid grid-c' + cols;

  if(blocks.length===0){
    grid.innerHTML = '<div class="empty-hint">尚未新增任何照片區塊</div>';
    return;
  }

  grid.innerHTML = blocks.map(b=>`
    <div class="preview-cell${splitCaption ? ' split' : ''}">
      <div class="preview-photo">
        ${b.dataUrl ? `<img src="${b.dataUrl}">` : '請點選此處文字後，貼上照片'}
      </div>
      <div class="preview-caption">說明：${escapeHtml(b.caption)}</div>
    </div>
  `).join('');
}

function escapeHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeXml(s){
  return (s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&apos;');
}

document.getElementById('docTitle').addEventListener('input', renderPreview);

// ---------- DOCX GENERATION ----------

const PAGE_CONTENT_WIDTH_DXA = 10466; // A4, 0.5in margins
const EMU_PER_DXA = 635;
const EMU_PER_PX = 9525; // assume 96dpi

// Returns an array of column widths (dxa) that sum exactly to PAGE_CONTENT_WIDTH_DXA
function getColWidths(n){
  const base = Math.floor(PAGE_CONTENT_WIDTH_DXA / n);
  const widths = Array(n).fill(base);
  widths[n-1] += PAGE_CONTENT_WIDTH_DXA - base*n; // give remainder to last column
  return widths;
}

// Per-row vertical overhead (table cell margins, caption line, spacing) and a
// small buffer for the page header taking slightly more than one line.
const ROW_OVERHEAD_EMU = 700000;
const HEADER_BUFFER_EMU = 100000;

// Pick a max image height so that the default block count for this layout
// fits within one A4 page (rowsPerPage = targetBlocks / cols).
function getMaxImgHeightEmu(){
  const pageContentHeightEmu = (16838 - 1417 - 720) * EMU_PER_DXA; // A4 minus top/bottom margins (top=2.5cm)
  const rowsPerPage = targetBlocks / cols;
  return Math.floor((pageContentHeightEmu - HEADER_BUFFER_EMU - rowsPerPage * ROW_OVERHEAD_EMU) / rowsPerPage);
}

function captionParagraphXml(text){
  const full = '說明：' + (text||'');
  const lines = full.split('\n');
  const runs = lines.map((line, i) => {
    const t = `<w:r><w:t xml:space="preserve">${escapeXml(line)}</w:t></w:r>`;
    return i < lines.length-1 ? t + '<w:r><w:br/></w:r>' : t;
  }).join('');
  return `<w:p><w:pPr><w:spacing w:after="120"/></w:pPr>${runs}</w:p>`;
}

function placeholderParagraphXml(){
  return `<w:p><w:pPr><w:spacing w:before="600" w:after="600"/><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:color w:val="999999"/><w:i/></w:rPr><w:t>（尚未上傳照片）</w:t></w:r></w:p>`;
}

function imageParagraphXml(relId, cx, cy, docPrId, srcRect){
  const srcRectXml = srcRect
    ? `<a:srcRect l="${srcRect.l}" t="${srcRect.t}" r="${srcRect.r}" b="${srcRect.b}"/>`
    : '';
  return `<w:p><w:pPr><w:spacing w:after="80"/><w:jc w:val="center"/></w:pPr><w:r><w:drawing>` +
    `<wp:inline distT="0" distB="0" distL="0" distR="0">` +
    `<wp:extent cx="${cx}" cy="${cy}"/>` +
    `<wp:docPr id="${docPrId}" name="Picture ${docPrId}"/>` +
    `<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main">` +
    `<a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">` +
    `<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">` +
    `<pic:nvPicPr><pic:cNvPr id="${docPrId}" name="Picture ${docPrId}"/><pic:cNvPicPr/></pic:nvPicPr>` +
    `<pic:blipFill><a:blip r:embed="${relId}"/>${srcRectXml}<a:stretch><a:fillRect/></a:stretch></pic:blipFill>` +
    `<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>` +
    `</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p>`;
}

function setStatus(msg, type){
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg' + (type ? ' '+type : '');
}

async function generateDocx(){
  const title = document.getElementById('docTitle').value.trim();
  if(!title){
    setStatus('請先輸入文件標題', 'error');
    return;
  }
  if(blocks.length===0){
    setStatus('請至少新增一個照片區塊', 'error');
    return;
  }

  const btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  setStatus('產生中，請稍候…');

  try{
    const colWidths = getColWidths(cols);
    const cellPaddingDxa = 220; // total left+right cell margin reserve
    const maxImgHeightEmu = getMaxImgHeightEmu(); // sized so the default block count fits one A4 page

    // 說明獨立成一個欄位時：照片欄佔 68%、說明欄佔 32%（同一列並排，而非疊在同一格）
    const photoColWidthDxa = Math.round(PAGE_CONTENT_WIDTH_DXA * 0.68);
    const captionColWidthDxa = PAGE_CONTENT_WIDTH_DXA - photoColWidthDxa;

    const zip = new JSZip();
    const mediaFiles = [];
    const rels = [];
    let cellsXml = [];
    let rowsXmlParts = [];
    let picId = 1;

    // 偵測多數方向：橫向多用 4:3，直向多用 3:4
    const imgBlocks = blocks.filter(b => b.file && b.dataUrl);
    const portraitCount = imgBlocks.filter(b => b.height > b.width).length;
    const TARGET_RATIO = (portraitCount > imgBlocks.length / 2) ? (3 / 4) : (4 / 3);

    for(let i=0;i<blocks.length;i++){
      const b = blocks[i];
      const colIdx = i % cols;
      const colWidth = splitCaption ? photoColWidthDxa : colWidths[colIdx];
      const maxImgWidthEmu = (colWidth - cellPaddingDxa) * EMU_PER_DXA;
      let photoInner, captionInner;
      if(b.file && b.dataUrl){
        const ext = (b.file.type === 'image/png') ? 'png' : 'jpeg';
        const base64 = b.dataUrl.split(',')[1];
        const idx = mediaFiles.length + 1;
        const fname = `image${idx}.${ext}`;
        mediaFiles.push({name: fname, base64});
        const relId = `rId${100+idx}`;
        rels.push({id: relId, target: `media/${fname}`});

        // 置中裁切到統一比例（<a:srcRect> 值為 per-millage，100000 = 100%）
        const imgRatio = b.width / b.height;
        let srcL = 0, srcT = 0, srcR = 0, srcB = 0;
        if (imgRatio > TARGET_RATIO) {
          // 相對目標比例太寬 → 裁左右
          const cropFrac = 1 - TARGET_RATIO / imgRatio;
          srcL = srcR = Math.round(cropFrac / 2 * 100000);
        } else if (imgRatio < TARGET_RATIO) {
          // 相對目標比例太高 → 裁上下
          const cropFrac = 1 - imgRatio / TARGET_RATIO;
          srcT = srcB = Math.round(cropFrac / 2 * 100000);
        }
        // 直向模式：cx 受 maxImgWidthEmu 限制，cy 受 maxImgHeightEmu 限制
        const cx = Math.round(Math.min(maxImgWidthEmu, maxImgHeightEmu * TARGET_RATIO));
        const cy = Math.round(cx / TARGET_RATIO);
        const srcRect = {l: srcL, t: srcT, r: srcR, b: srcB};

        photoInner = imageParagraphXml(relId, cx, cy, picId++, srcRect);
      } else {
        photoInner = placeholderParagraphXml();
      }
      captionInner = captionParagraphXml(b.caption);

      if(splitCaption){
        const photoCell = `<w:tc><w:tcPr><w:tcW w:w="${photoColWidthDxa}" w:type="dxa"/><w:vAlign w:val="center"/><w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="110" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="110" w:type="dxa"/></w:tcMar></w:tcPr>${photoInner}</w:tc>`;
        const captionCell = `<w:tc><w:tcPr><w:tcW w:w="${captionColWidthDxa}" w:type="dxa"/><w:vAlign w:val="center"/><w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="110" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="110" w:type="dxa"/></w:tcMar></w:tcPr>${captionInner}</w:tc>`;
        rowsXmlParts.push(`<w:tr>${photoCell}${captionCell}</w:tr>`);
      } else {
        cellsXml.push(
          `<w:tc><w:tcPr><w:tcW w:w="${colWidth}" w:type="dxa"/><w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="110" w:type="dxa"/><w:bottom w:w="80" w:type="dxa"/><w:right w:w="110" w:type="dxa"/></w:tcMar></w:tcPr>${photoInner}${captionInner}</w:tc>`
        );
      }
    }

    let rowsXml, gridCols;
    if(splitCaption){
      rowsXml = rowsXmlParts.join('');
      gridCols = `<w:gridCol w:w="${photoColWidthDxa}"/><w:gridCol w:w="${captionColWidthDxa}"/>`;
    } else {
      // pad to full rows
      while(cellsXml.length % cols !== 0){
        const colIdx = cellsXml.length % cols;
        cellsXml.push(`<w:tc><w:tcPr><w:tcW w:w="${colWidths[colIdx]}" w:type="dxa"/></w:tcPr><w:p/></w:tc>`);
      }
      rowsXml = '';
      for(let i=0;i<cellsXml.length;i+=cols){
        rowsXml += `<w:tr>${cellsXml.slice(i,i+cols).join('')}</w:tr>`;
      }
      gridCols = colWidths.map(w=>`<w:gridCol w:w="${w}"/>`).join('');
    }

    // ---- Header (title, optionally with logo) — rendered as a real page header (w:hdr), not body content ----
    const headerRels = [];
    let headerPicId = 1;
    let headerContentXml;
    if(logo && logo.dataUrl){
      const ext = (logo.file.type === 'image/png') ? 'png' : 'jpeg';
      const base64 = logo.dataUrl.split(',')[1];
      const idx = mediaFiles.length + 1;
      const fname = `image${idx}.${ext}`;
      mediaFiles.push({name: fname, base64});
      const relId = `rId1`; // header1.xml has its own relationship namespace
      headerRels.push({id: relId, target: `media/${fname}`});

      // size logo to fit within a box, then derive left column width from it
      const maxLogoWEmu = 2600000;
      const maxLogoHEmu = 400000;
      const wEmu = logo.width * EMU_PER_PX;
      const hEmu = logo.height * EMU_PER_PX;
      const scale = Math.min(maxLogoWEmu/wEmu, maxLogoHEmu/hEmu, 1) || 1;
      const cx = Math.round(wEmu*scale);
      const cy = Math.round(hEmu*scale);

      let leftColWidth = Math.round(cx/EMU_PER_DXA) + 300;
      leftColWidth = Math.max(1400, Math.min(leftColWidth, 3000));
      const rightColWidth = PAGE_CONTENT_WIDTH_DXA - leftColWidth;

      const midColWidth = PAGE_CONTENT_WIDTH_DXA - 2 * leftColWidth;

      const logoCell = `<w:tc><w:tcPr><w:tcW w:w="${leftColWidth}" w:type="dxa"/><w:vAlign w:val="center"/></w:tcPr>` +
        `<w:p><w:pPr><w:spacing w:after="0"/><w:jc w:val="left"/></w:pPr><w:r><w:drawing>` +
        `<wp:inline distT="0" distB="0" distL="0" distR="0"><wp:extent cx="${cx}" cy="${cy}"/><wp:docPr id="${headerPicId}" name="Picture ${headerPicId}"/>` +
        `<a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture">` +
        `<pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:nvPicPr><pic:cNvPr id="${headerPicId}" name="Picture ${headerPicId}"/><pic:cNvPicPr/></pic:nvPicPr>` +
        `<pic:blipFill><a:blip r:embed="${relId}"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill>` +
        `<pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr>` +
        `</pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing></w:r></w:p></w:tc>`;
      headerPicId++;

      const titleCell = `<w:tc><w:tcPr><w:tcW w:w="${midColWidth}" w:type="dxa"/><w:vAlign w:val="center"/></w:tcPr>` +
        `<w:p><w:pPr><w:spacing w:after="0"/><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="32"/></w:rPr><w:t xml:space="preserve">${escapeXml(title)}</w:t></w:r></w:p></w:tc>`;

      const spacerCell = `<w:tc><w:tcPr><w:tcW w:w="${leftColWidth}" w:type="dxa"/><w:vAlign w:val="center"/></w:tcPr>` +
        `<w:p><w:pPr><w:spacing w:after="0"/></w:pPr></w:p></w:tc>`;

      headerContentXml =
        `<w:tbl><w:tblPr><w:tblW w:w="${PAGE_CONTENT_WIDTH_DXA}" w:type="dxa"/>` +
        `<w:tblBorders><w:top w:val="none" w:sz="0" w:color="auto"/><w:left w:val="none" w:sz="0" w:color="auto"/><w:bottom w:val="single" w:sz="12" w:color="8B2E2E"/><w:right w:val="none" w:sz="0" w:color="auto"/><w:insideH w:val="none" w:sz="0" w:color="auto"/><w:insideV w:val="none" w:sz="0" w:color="auto"/></w:tblBorders>` +
        `<w:tblLayout w:type="fixed"/></w:tblPr>` +
        `<w:tblGrid><w:gridCol w:w="${leftColWidth}"/><w:gridCol w:w="${midColWidth}"/><w:gridCol w:w="${leftColWidth}"/></w:tblGrid>` +
        `<w:tr>${logoCell}${titleCell}${spacerCell}</w:tr></w:tbl>`;
    } else {
      headerContentXml = `<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="12" w:space="6" w:color="8B2E2E"/></w:pBdr><w:spacing w:after="0"/><w:jc w:val="center"/></w:pPr><w:r><w:rPr><w:b/><w:sz w:val="32"/></w:rPr><w:t xml:space="preserve">${escapeXml(title)}</w:t></w:r></w:p>`;
    }

    const headerXmlFile =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:hdr xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">
${headerContentXml}
</w:hdr>`;

    const headerRelsXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
${headerRels.map(r=>`<Relationship Id="${r.id}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="${r.target}"/>`).join('\n')}
</Relationships>`;

    rels.push({id: 'rId900', target: 'header1.xml', type: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/header'});

    const documentXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">
<w:body>
<w:tbl>
<w:tblPr><w:tblW w:w="${PAGE_CONTENT_WIDTH_DXA}" w:type="dxa"/><w:tblBorders><w:top w:val="single" w:sz="4" w:color="AAAAAA"/><w:left w:val="single" w:sz="4" w:color="AAAAAA"/><w:bottom w:val="single" w:sz="4" w:color="AAAAAA"/><w:right w:val="single" w:sz="4" w:color="AAAAAA"/><w:insideH w:val="single" w:sz="4" w:color="AAAAAA"/><w:insideV w:val="single" w:sz="4" w:color="AAAAAA"/></w:tblBorders><w:tblLayout w:type="fixed"/></w:tblPr>
<w:tblGrid>${gridCols}</w:tblGrid>
${rowsXml}
</w:tbl>
<w:p/>
<w:sectPr><w:headerReference w:type="default" r:id="rId900"/><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1417" w:right="720" w:bottom="720" w:left="720" w:header="340" w:footer="720" w:gutter="0"/></w:sectPr>
</w:body>
</w:document>`;

    const relsXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
${rels.map(r=>`<Relationship Id="${r.id}" Type="${r.type || 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/image'}" Target="${r.target}"/>`).join('\n')}
</Relationships>`;

    const contentTypesXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Default Extension="png" ContentType="image/png"/>
<Default Extension="jpeg" ContentType="image/jpeg"/>
<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
<Override PartName="/word/header1.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.header+xml"/>
<Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>
</Types>`;

    const rootRelsXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
<Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/>
</Relationships>`;

    const coreXml =
`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/">
<dc:title>${escapeXml(title)}</dc:title>
<dc:creator>體育班評鑑文件工具</dc:creator>
</cp:coreProperties>`;

    zip.file('[Content_Types].xml', contentTypesXml);
    zip.folder('_rels').file('.rels', rootRelsXml);
    zip.folder('docProps').file('core.xml', coreXml);
    const wordFolder = zip.folder('word');
    wordFolder.file('document.xml', documentXml);
    wordFolder.file('header1.xml', headerXmlFile);
    const wordRelsFolder = wordFolder.folder('_rels');
    wordRelsFolder.file('document.xml.rels', relsXml);
    wordRelsFolder.file('header1.xml.rels', headerRelsXml);
    const mediaFolder = wordFolder.folder('media');
    mediaFiles.forEach(m=>{
      mediaFolder.file(m.name, m.base64, {base64:true});
    });

    const blob = await zip.generateAsync({type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    const filename = (title.replace(/[\\/:*?"<>|]/g,'') || '照片佐證資料') + '.docx';
    saveAs(blob, filename);
    setStatus('已產生並下載：' + filename, 'ok');
  }catch(err){
    console.error(err);
    setStatus('產生失敗：' + err.message, 'error');
  }finally{
    btn.disabled = false;
  }
}

// init
logo = {
  file: {type:'image/jpeg'},
  dataUrl: DEFAULT_LOGO_DATAURL,
  width: DEFAULT_LOGO_WIDTH,
  height: DEFAULT_LOGO_HEIGHT
};
document.getElementById('logoPreview').innerHTML = `<img src="${DEFAULT_LOGO_DATAURL}">`;
document.getElementById('logoFileName').textContent = '右昌國小校徽（預設）';
document.getElementById('logoClearBtn').style.display = 'inline-block';

renderBlocks();
renderPreview();
addBlock();

</script>
