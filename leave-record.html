<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/1.3.8/FileSaver.min.js"></script>

<style>
:root{
  --paper:#F6F4EE;--card:#FFFFFF;--ink:#2B2B28;--ink-soft:#6B675F;
  --navy:#223A52;--navy-soft:#3E5872;--maroon:#8B2E2E;--gold:#C9A24B;
  --green:#2E7A2E;--line:#E1DCCF;--line-strong:#C8C2B2;
}
*{box-sizing:border-box;}
body{margin:0;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",-apple-system,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;}
.wrap{max-width:900px;margin:0 auto;padding:28px 18px 120px;}
.app-header{margin-bottom:22px;}
.eyebrow{font-size:12px;letter-spacing:.18em;color:var(--maroon);font-weight:700;text-transform:uppercase;margin:0 0 6px;}
.app-header h1{font-size:24px;margin:0 0 8px;color:var(--navy);border-bottom:3px solid var(--maroon);padding-bottom:10px;line-height:1.4;}
.app-header p{margin:8px 0 0;color:var(--ink-soft);font-size:14px;line-height:1.7;}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:18px;margin-bottom:16px;}
.card h2{font-size:15px;margin:0 0 14px;color:var(--navy);display:flex;align-items:center;gap:8px;}
.card h2 .num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:12px;font-weight:700;flex-shrink:0;}
label.field-label{display:block;font-size:13px;color:var(--ink-soft);margin-bottom:5px;font-weight:600;}
input[type="text"],input[type="date"],select,textarea{width:100%;border:1px solid var(--line-strong);border-radius:8px;padding:8px 11px;font-size:14px;font-family:inherit;background:#FCFBF8;color:var(--ink);}
input[type="text"]:focus,input[type="date"]:focus,select:focus,textarea:focus{outline:2px solid var(--navy-soft);outline-offset:1px;border-color:var(--navy-soft);}
textarea{resize:vertical;min-height:80px;line-height:1.6;}
.row-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* import box */
.import-box{background:#F5F2EC;border:1.5px dashed var(--line-strong);border-radius:8px;padding:14px;margin-bottom:12px;}
.import-box p{margin:0 0 8px;font-size:13px;color:var(--ink-soft);}
.import-box code{background:#E8E3D8;border-radius:4px;padding:2px 6px;font-size:12px;font-family:monospace;}
.import-actions{display:flex;gap:8px;flex-wrap:wrap;}
.outline-btn{border:1px solid var(--navy-soft);background:#fff;color:var(--navy);border-radius:7px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.outline-btn:hover{background:#EEF2F6;}
.outline-btn.danger{border-color:var(--maroon);color:var(--maroon);}
.outline-btn.danger:hover{background:#FDF0F0;}
.paste-area{margin-top:10px;display:none;}

/* data table */
.data-table-wrap{overflow-x:auto;margin-bottom:12px;}
.data-table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px;}
.data-table th{background:var(--navy);color:#fff;padding:8px 10px;text-align:center;font-weight:700;white-space:nowrap;}
.data-table td{padding:5px 6px;border-bottom:1px solid var(--line);vertical-align:middle;}
.data-table tr:hover td{background:#F5F2EC;}
.data-table input[type="text"],.data-table input[type="date"],.data-table select{padding:5px 7px;font-size:13px;border-radius:6px;}
.data-table .del-btn{border:1px solid var(--maroon);background:none;color:var(--maroon);border-radius:5px;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;margin:auto;}
.data-table .del-btn:hover{background:var(--maroon);color:#fff;}
.add-row-btn{width:100%;border:1.5px dashed var(--navy-soft);color:var(--navy);background:#EEF2F6;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;}
.add-row-btn:hover{background:#E3E9EF;}
.row-count{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}

/* preview */
.preview-section{margin-top:8px;}
.preview-grade-title{font-size:14px;font-weight:700;color:var(--navy);margin:14px 0 6px;padding-left:8px;border-left:3px solid var(--maroon);}
.preview-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;}
.preview-tbl th{background:#EFEAE0;border:1px solid #C8C2B2;padding:5px 8px;text-align:center;font-weight:700;}
.preview-tbl td{border:1px solid #C8C2B2;padding:5px 8px;text-align:center;}

/* bottom bar */
.bottom-bar{position:fixed;left:0;right:0;bottom:0;background:rgba(246,244,238,.92);backdrop-filter:blur(6px);border-top:1px solid var(--line);padding:12px 18px;display:flex;justify-content:center;gap:10px;z-index:10;}
.bottom-bar .inner{max-width:900px;width:100%;display:flex;gap:10px;align-items:center;}
.primary-btn{flex:1;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:13px 20px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.primary-btn:hover{background:var(--navy-soft);}
.primary-btn:disabled{background:#B9B6AD;cursor:not-allowed;}
.status-msg{font-size:12px;color:var(--ink-soft);min-width:120px;text-align:right;}
.status-msg.error{color:var(--maroon);}
.status-msg.ok{color:#2E7D4F;}
</style>

<div class="wrap">
  <div class="app-header">
    <p class="eyebrow">體育班評鑑文件工具・模組五</p>
    <h1>學生公假統計表產生器</h1>
    <p>輸入學年度與運動項目，逐筆填寫學生公假記錄，或從 Excel 貼上匯入。系統會依年級分組，產生與原始格式相符的 Word 檔。</p>
  </div>

  <!-- 基本資訊 -->
  <div class="card">
    <h2><span class="num">1</span>基本資訊</h2>
    <div class="row-2col">
      <div>
        <label class="field-label">學年度</label>
        <select id="leaveYear">
          <option>113學年度</option>
          <option selected>114學年度</option>
          <option>115學年度</option>
          <option>116學年度</option>
          <option>117學年度</option>
        </select>
      </div>
      <div>
        <label class="field-label">運動項目</label>
        <input type="text" id="leaveSport" placeholder="例：足球、田徑" value="足球">
      </div>
    </div>
  </div>

  <!-- 匯入 -->
  <div class="card">
    <h2><span class="num">2</span>匯入資料（選用）</h2>
    <div class="import-box">
      <p>從 Excel 複製資料後貼入，欄位順序：<code>年級</code> <code>姓名</code> <code>比賽名稱</code> <code>公假開始日期</code> <code>公假結束日期</code></p>
      <p style="font-size:12px;color:#888;margin:0">日期格式支援：113/09/30、2024/09/30、2024-09-30</p>
      <div class="import-actions" style="margin-top:10px;">
        <button class="outline-btn" onclick="togglePasteArea()">📋 貼上 Excel 資料</button>
        <button class="outline-btn danger" onclick="clearAllRows()">✕ 清除全部</button>
      </div>
      <div class="paste-area" id="pasteArea">
        <label class="field-label" style="margin-top:10px;">貼入資料（Ctrl+V）：</label>
        <textarea id="pasteInput" rows="6" placeholder="在此貼上從 Excel 複製的資料，每列一筆記錄"></textarea>
        <button class="outline-btn" style="margin-top:6px;" onclick="importFromPaste()">✅ 匯入</button>
      </div>
    </div>
  </div>

  <!-- 資料輸入 -->
  <div class="card">
    <h2><span class="num">3</span>公假記錄</h2>
    <div class="row-count" id="rowCount">目前 0 筆</div>
    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:50px">項次</th>
            <th style="width:80px">年級</th>
            <th style="width:120px">學生姓名</th>
            <th>比賽名稱</th>
            <th style="width:130px">公假開始日期</th>
            <th style="width:130px">公假結束日期</th>
            <th style="width:36px"></th>
          </tr>
        </thead>
        <tbody id="leaveTableBody"></tbody>
      </table>
    </div>
    <button class="add-row-btn" onclick="addRow()">＋ 新增一筆記錄</button>
  </div>

  <!-- 預覽 -->
  <div class="card" id="previewCard" style="display:none">
    <h2><span class="num">4</span>預覽（依年級分組）</h2>
    <div id="previewContent" class="preview-section"></div>
  </div>
</div>

<div class="bottom-bar">
  <div class="inner">
    <button class="primary-btn" id="downloadBtn" onclick="generateDocx()">⬇ 下載 Word 檔（公假統計表）</button>
    <span class="status-msg" id="statusMsg"></span>
  </div>
</div>

<script>
var rows = [];
var nextId = 0;

var GRADES = ['1年級','2年級','3年級','4年級','5年級','6年級'];

/* ── 列管理 ── */
function addRow(data){
  var id = nextId++;
  rows.push({ id, grade: data&&data.grade||'', name: data&&data.name||'', match: data&&data.match||'', start: data&&data.start||'', end: data&&data.end||'' });
  renderTable();
  if(!data) updatePreview();
}

function deleteRow(id){
  rows = rows.filter(function(r){ return r.id !== id; });
  renderTable();
  updatePreview();
}

function clearAllRows(){
  if(rows.length && !confirm('確定清除全部 '+rows.length+' 筆資料？')) return;
  rows = [];
  renderTable();
  updatePreview();
}

function getRowData(id){
  var r = rows.find(function(r){ return r.id===id; });
  if(!r) return;
  r.grade = document.getElementById('grade_'+id).value;
  r.name  = document.getElementById('name_'+id).value.trim();
  r.match = document.getElementById('match_'+id).value.trim();
  r.start = document.getElementById('start_'+id).value;
  r.end   = document.getElementById('end_'+id).value;
}

function onFieldChange(id){
  getRowData(id);
  updatePreview();
}

function renderTable(){
  var tbody = document.getElementById('leaveTableBody');
  tbody.innerHTML = '';
  rows.forEach(function(r, idx){
    var tr = document.createElement('tr');
    var gradeOpts = GRADES.map(function(g){ return '<option'+(r.grade===g?' selected':'')+'>'+g+'</option>'; }).join('');
    tr.innerHTML =
      '<td style="text-align:center;color:var(--ink-soft);">'+(idx+1)+'</td>'+
      '<td><select id="grade_'+r.id+'" onchange="onFieldChange('+r.id+')">'+gradeOpts+'</select></td>'+
      '<td><input type="text" id="name_'+r.id+'" value="'+escHtml(r.name)+'" placeholder="姓名" onchange="onFieldChange('+r.id+')"></td>'+
      '<td><input type="text" id="match_'+r.id+'" value="'+escHtml(r.match)+'" placeholder="比賽名稱" onchange="onFieldChange('+r.id+')"></td>'+
      '<td><input type="date" id="start_'+r.id+'" value="'+r.start+'" onchange="onFieldChange('+r.id+')"></td>'+
      '<td><input type="date" id="end_'+r.id+'" value="'+r.end+'" onchange="onFieldChange('+r.id+')"></td>'+
      '<td><button class="del-btn" onclick="deleteRow('+r.id+')">✕</button></td>';
    tbody.appendChild(tr);
  });
  document.getElementById('rowCount').textContent = '目前 '+rows.length+' 筆';
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── 匯入 ── */
function togglePasteArea(){
  var el = document.getElementById('pasteArea');
  el.style.display = el.style.display==='none'?'block':'none';
}

function parseDate(s){
  if(!s) return '';
  s = s.trim();
  // 113/09/30 → 民國，轉西元
  var m = s.match(/^(\d{2,3})\/(\d{1,2})\/(\d{1,2})$/);
  if(m){
    var y = parseInt(m[1]);
    if(y < 1000) y += 1911;
    return y+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  }
  // 2024/09/30 or 2024-09-30
  m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  return s;
}

function importFromPaste(){
  var raw = document.getElementById('pasteInput').value.trim();
  if(!raw){ alert('請先貼入資料'); return; }
  var lines = raw.split('\n');
  var count = 0;
  lines.forEach(function(line){
    var cols = line.split('\t');
    if(cols.length < 2) return;
    // 欄位：年級, 姓名, 比賽名稱, 開始日期, 結束日期
    var grade = (cols[0]||'').trim();
    var name  = (cols[1]||'').trim();
    var match = (cols[2]||'').trim();
    var start = parseDate(cols[3]);
    var end   = parseDate(cols[4]);
    // 年級格式化
    if(grade && !grade.includes('年級')) grade = grade + '年級';
    if(!GRADES.includes(grade)) grade = GRADES[0];
    if(!name) return;
    addRow({ grade, name, match, start, end });
    count++;
  });
  document.getElementById('pasteInput').value = '';
  document.getElementById('pasteArea').style.display = 'none';
  updatePreview();
  setStatus('已匯入 '+count+' 筆', 'ok');
}

/* ── 預覽 ── */
function getGrouped(){
  // 先同步所有欄位值
  rows.forEach(function(r){ getRowData(r.id); });
  var groups = {};
  rows.forEach(function(r){
    if(!r.name) return;
    var g = r.grade || GRADES[0];
    if(!groups[g]) groups[g] = [];
    groups[g].push(r);
  });
  return groups;
}

function updatePreview(){
  var groups = getGrouped();
  var sport = document.getElementById('leaveSport').value || '足球';
  var year  = document.getElementById('leaveYear').value || '';
  var gradeKeys = GRADES.filter(function(g){ return groups[g]&&groups[g].length>0; });
  var card = document.getElementById('previewCard');
  var content = document.getElementById('previewContent');
  if(gradeKeys.length===0){ card.style.display='none'; return; }
  card.style.display='block';
  var html = '';
  gradeKeys.forEach(function(grade){
    var list = groups[grade];
    html += '<div class="preview-grade-title">'+year+'　'+sport+'類　'+grade+'</div>';
    html += '<table class="preview-tbl"><thead><tr><th>項次</th><th>學生姓名</th><th>運動項目</th><th>比賽名稱</th><th>開始日期</th><th>結束日期</th></tr></thead><tbody>';
    list.forEach(function(r, i){
      html += '<tr><td>'+(i+1)+'</td><td>'+escHtml(r.name)+'</td><td>'+escHtml(sport)+'</td><td>'+escHtml(r.match)+'</td><td>'+formatDateROC(r.start)+'</td><td>'+formatDateROC(r.end)+'</td></tr>';
    });
    html += '</tbody></table>';
  });
  content.innerHTML = html;
}

function formatDateROC(s){
  if(!s) return '';
  var m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return s;
  return (parseInt(m[1])-1911)+'/'+m[2]+'/'+m[3];
}

/* ── 狀態 ── */
function setStatus(msg, type){
  var el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status-msg'+(type?' '+type:'');
}

/* ── Word 產生 ── */
function escXml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

function cellXml(content, w, opts){
  opts = opts||{};
  var shading = opts.shading ? '<w:shd w:val="clear" w:color="auto" w:fill="'+opts.shading+'"/>' : '';
  var vAlign  = opts.vAlign  ? '<w:vAlign w:val="'+opts.vAlign+'"/>' : '<w:vAlign w:val="center"/>';
  var span    = opts.span    ? '<w:gridSpan w:val="'+opts.span+'"/>' : '';
  return '<w:tc><w:tcPr><w:tcW w:w="'+w+'" w:type="dxa"/>'+span+shading+vAlign+'</w:tcPr>'+content+'</w:tc>';
}

function paraXml(text, opts){
  opts = opts||{};
  var jc      = opts.jc     ? '<w:jc w:val="'+opts.jc+'"/>' : '<w:jc w:val="center"/>';
  var bold    = opts.bold   ? '<w:b/>' : '';
  var sz      = opts.sz     ? '<w:sz w:val="'+opts.sz+'"/><w:szCs w:val="'+opts.sz+'"/>' : '<w:sz w:val="24"/><w:szCs w:val="24"/>';
  var spacing = (opts.spacing!==undefined) ? '<w:spacing w:line="'+opts.spacing+'" w:lineRule="auto"/>' : '<w:spacing w:line="360" w:lineRule="auto"/>';
  var font = '<w:rFonts w:ascii="Times New Roman" w:eastAsia="標楷體" w:hAnsi="Times New Roman" w:cs="Times New Roman"/>';
  return '<w:p><w:pPr>'+spacing+jc+'<w:rPr>'+font+bold+sz+'</w:rPr></w:pPr>'+
    '<w:r><w:rPr>'+font+bold+sz+'</w:rPr><w:t xml:space="preserve">'+escXml(text)+'</w:t></w:r></w:p>';
}

async function generateDocx(){
  rows.forEach(function(r){ getRowData(r.id); });
  var groups = getGrouped();
  var gradeKeys = GRADES.filter(function(g){ return groups[g]&&groups[g].length>0; });
  if(gradeKeys.length===0){ setStatus('請至少輸入一筆記錄', 'error'); return; }

  var sport = document.getElementById('leaveSport').value.trim() || '足球';
  var year  = document.getElementById('leaveYear').value || '114學年度';
  var yearNum = year.replace('學年度','');

  var btn = document.getElementById('downloadBtn');
  btn.disabled = true;
  setStatus('產生中，請稍候…');

  // Page: A4, margin top/bottom 1134, left/right 1134 (2cm)
  var PAGE_W = 11906, PAGE_H = 16838;
  var MARGIN = 1134;
  var CONTENT_W = PAGE_W - MARGIN*2; // 9638

  // Column widths (sum = CONTENT_W = 9638)
  var COL = [560, 1400, 1400, 4278, 1000, 1000];
  // 項次, 姓名, 運動項目, 比賽名稱, 開始日期, 結束日期

  var BDR_H = '<w:top w:val="single" w:sz="12" w:space="0" w:color="000000"/><w:left w:val="single" w:sz="12" w:space="0" w:color="000000"/><w:bottom w:val="single" w:sz="12" w:space="0" w:color="000000"/><w:right w:val="single" w:sz="12" w:space="0" w:color="000000"/><w:insideH w:val="single" w:sz="4" w:space="0" w:color="000000"/><w:insideV w:val="single" w:sz="4" w:space="0" w:color="000000"/>';

  var gridCols = COL.map(function(w){ return '<w:gridCol w:w="'+w+'"/>'; }).join('');

  function makeTable(list){
    // 標頭
    var headers = ['項次','學生姓名','運動項目','比賽名稱','開始日期','結束日期'];
    var hCells = headers.map(function(h,i){
      return cellXml(paraXml(h,{bold:true,sz:24}), COL[i], {shading:'D9D9D9', vAlign:'center'});
    }).join('');
    var headRow = '<w:tr><w:trPr><w:jc w:val="center"/></w:trPr>'+hCells+'</w:tr>';

    var dataRows = list.map(function(r, idx){
      var cells = [
        cellXml(paraXml(String(idx+1)), COL[0]),
        cellXml(paraXml(r.name), COL[1]),
        cellXml(paraXml(sport), COL[2]),
        cellXml(paraXml(r.match,{jc:'left'}), COL[3]),
        cellXml(paraXml(formatDateROC(r.start)), COL[4]),
        cellXml(paraXml(formatDateROC(r.end)), COL[5]),
      ].join('');
      return '<w:tr><w:trPr><w:jc w:val="center"/></w:trPr>'+cells+'</w:tr>';
    }).join('');

    return '<w:tbl>'+
      '<w:tblPr>'+
        '<w:tblW w:w="'+CONTENT_W+'" w:type="dxa"/>'+
        '<w:jc w:val="center"/>'+
        '<w:tblBorders>'+BDR_H+'</w:tblBorders>'+
      '</w:tblPr>'+
      '<w:tblGrid>'+gridCols+'</w:tblGrid>'+
      headRow + dataRows +
      '</w:tbl>';
  }

  // 段落：標題行
  function titlePara(grade){
    var font = '<w:rFonts w:ascii="Times New Roman" w:eastAsia="標楷體" w:hAnsi="Times New Roman" w:cs="Times New Roman"/>';
    var sz = '<w:sz w:val="32"/><w:szCs w:val="32"/>';
    var text = '學年度：'+yearNum+'學年度              '+sport+'類    年級：'+grade;
    return '<w:p><w:pPr><w:spacing w:line="360" w:lineRule="auto"/><w:jc w:val="both"/><w:rPr>'+font+sz+'</w:rPr></w:pPr>'+
      '<w:r><w:rPr>'+font+sz+'</w:rPr><w:t xml:space="preserve">'+escXml(text)+'</w:t></w:r></w:p>';
  }

  function pageBreakPara(){
    return '<w:p><w:r><w:br w:type="page"/></w:r></w:p>';
  }

  var bodyParts = [];
  gradeKeys.forEach(function(grade, i){
    if(i > 0) bodyParts.push(pageBreakPara());
    bodyParts.push(titlePara(grade));
    bodyParts.push(makeTable(groups[grade]));
    bodyParts.push('<w:p/>');
  });

  var bodyXml = bodyParts.join('') + '<w:sectPr>'+
    '<w:pgSz w:w="'+PAGE_W+'" w:h="'+PAGE_H+'"/>'+
    '<w:pgMar w:top="'+MARGIN+'" w:right="'+MARGIN+'" w:bottom="'+MARGIN+'" w:left="'+MARGIN+'" w:header="709" w:footer="709" w:gutter="0"/>'+
    '</w:sectPr>';

  var documentXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"'+
    ' xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"'+
    ' xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"'+
    ' xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"'+
    ' xmlns:v="urn:schemas-microsoft-com:vml"'+
    ' xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"'+
    ' xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"'+
    ' xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"'+
    ' xmlns:w15="http://schemas.microsoft.com/office/word/2012/wordml"'+
    ' mc:Ignorable="w14 w15">'+
    '<w:body>'+bodyXml+'</w:body></w:document>';

  var relsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>'+
    '</Relationships>';

  var stylesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">'+
    '<w:docDefaults><w:rPrDefault><w:rPr>'+
    '<w:rFonts w:ascii="Times New Roman" w:eastAsia="標楷體" w:hAnsi="Times New Roman" w:cs="Times New Roman"/>'+
    '<w:sz w:val="24"/><w:szCs w:val="24"/>'+
    '</w:rPr></w:rPrDefault></w:docDefaults></w:styles>';

  var contentTypesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'+
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'+
    '<Default Extension="xml" ContentType="application/xml"/>'+
    '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>'+
    '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>'+
    '</Types>';

  var rootRelsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>'+
    '</Relationships>';

  try{
    var zip = new JSZip();
    zip.file('[Content_Types].xml', contentTypesXml);
    zip.file('_rels/.rels', rootRelsXml);
    zip.file('word/document.xml', documentXml);
    zip.file('word/_rels/document.xml.rels', relsXml);
    zip.file('word/styles.xml', stylesXml);
    var blob = await zip.generateAsync({type:'blob', mimeType:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
    var fileName = yearNum+'學年度_'+sport+'_公假統計表.docx';
    saveAs(blob, fileName);
    setStatus('✅ 下載成功！', 'ok');
  } catch(e){
    setStatus('產生失敗：'+e.message, 'error');
  }
  btn.disabled = false;
  updatePreview();
}

// 初始加入一筆空白列
addRow();
</script>
