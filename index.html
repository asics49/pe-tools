*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#F0EDE6;color:#2B2B28;font-size:14px;}

/* ── Header ── */
.header{background:#223A52;color:#fff;padding:14px 20px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.header-title{font-size:16px;font-weight:700;letter-spacing:.04em;}
.header-title span{color:#C9A24B;}
.header-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:3px;}

/* ── Filter Bar ── */
.filter-bar{background:#fff;border-bottom:1px solid #E1DCCF;padding:10px 16px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.filter-label{font-size:12px;color:#6B675F;margin-right:4px;white-space:nowrap;}
.filter-btn{border:1.5px solid #C8C2B2;background:#fff;border-radius:20px;padding:4px 12px;font-size:12px;font-family:inherit;cursor:pointer;color:#555;transition:all .15s;}
.filter-btn:hover{border-color:#223A52;color:#223A52;}
.filter-btn.active{background:#223A52;border-color:#223A52;color:#fff;font-weight:700;}
.filter-btn.all-btn{background:#223A52;border-color:#223A52;color:#fff;}
.filter-btn.all-btn.inactive{background:#fff;color:#555;}

/* ── Main ── */
.main{max-width:960px;margin:0 auto;padding:20px 16px 80px;}

/* ── Major Section ── */
.major-section{margin-bottom:28px;}
.major-title{background:#223A52;color:#fff;padding:10px 16px;border-radius:8px 8px 0 0;font-size:15px;font-weight:700;letter-spacing:.03em;}

/* ── Sub Section ── */
.sub-section{border:1px solid #D8D3CB;border-top:none;border-radius:0 0 4px 4px;overflow:hidden;margin-bottom:1px;}
.sub-section:last-child{border-radius:0 0 8px 8px;}
.sub-header{background:#E8E4DC;padding:8px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #D8D3CB;}
.sub-id{background:#8B2E2E;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.sub-name{font-size:13px;font-weight:700;color:#223A52;}

/* ── Doc Table ── */
.doc-table{width:100%;border-collapse:collapse;}
.doc-table th{background:#F5F2EC;font-size:11px;color:#6B675F;font-weight:700;padding:6px 12px;text-align:left;border-bottom:1px solid #E1DCCF;}
.doc-table td{padding:8px 12px;border-bottom:1px solid #EDE9E1;vertical-align:middle;}
.doc-table tr:last-child td{border-bottom:none;}
.doc-table tr.hidden-row{display:none;}
.doc-table tr:hover td{background:#FAF8F4;}

.doc-name{font-size:13px;color:#2B2B28;}
.person-tag{display:inline-block;background:#EBF0F5;color:#223A52;border-radius:4px;padding:2px 8px;font-size:11px;margin:1px;}

/* ── Type Badge ── */
.badge{display:inline-block;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge-template{background:#FFF0E0;color:#B85C00;}
.badge-doc{background:#F0F4FF;color:#2E4EA0;}
.badge-photo{background:#F0F7EE;color:#2E7A2E;}
.badge-other{background:#F5F5F5;color:#888;}

/* ── Module Button ── */
.mod-btn{display:inline-flex;align-items:center;gap:5px;background:#C9A24B;color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;text-decoration:none;white-space:nowrap;transition:background .15s;}
.mod-btn:hover{background:#B8913A;}
.mod-btn svg{width:13px;height:13px;flex-shrink:0;}

/* ── Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:8px;padding:10px 16px;background:#fff;border-bottom:1px solid #E1DCCF;font-size:11px;}
.legend-item{display:flex;align-items:center;gap:4px;}

/* ── Stats ── */
.stats{display:flex;gap:16px;padding:10px 16px;background:#fff;border-bottom:2px solid #E1DCCF;font-size:12px;color:#6B675F;}
.stat-num{font-weight:700;color:#223A52;font-size:15px;}

// ── Build person list ──
var personSet = new Set();
DATA.forEach(function(sec){
  sec.subs.forEach(function(sub){
    sub.docs.forEach(function(doc){
      if(doc.person && doc.person !== '—'){
        doc.person.split('/').forEach(function(p){ personSet.add(p.trim()); });
      }
    });
  });
});
var persons = Array.from(personSet).sort();

// ── Render filter buttons ──
var fb = document.getElementById('filterBar');
persons.forEach(function(p){
  var btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = p;
  btn.onclick = function(){ filterPerson(p); };
  fb.appendChild(btn);
});

// ── Type badge ──
function typeBadge(t){
  if(t==='需制式範本') return '<span class="badge badge-template">需制式範本</span>';
  if(t==='既有公文')   return '<span class="badge badge-doc">既有公文</span>';
  if(t==='照片佐證')   return '<span class="badge badge-photo">照片佐證</span>';
  return '<span class="badge badge-other">'+t+'</span>';
}

// ── Module button ──
function modBtn(mid){
  if(!mid) return '';
  return '<a class="mod-btn" href="'+TOOL_URL+'#'+mid+'" target="_blank">'
    +'<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3M9 2h5v5M14 2L8 8"/></svg>'
    +'點此使用工具</a>';
}

// ── Person tags ──
function personTags(p){
  if(!p||p==='—') return '<span style="color:#aaa">—</span>';
  return p.split('/').map(function(x){
    return '<span class="person-tag">'+x.trim()+'</span>';
  }).join('');
}

// ── Render ──
var main = document.getElementById('mainContent');
var totalDocs=0, totalTemplate=0, totalDoc=0, totalPhoto=0, totalModule=0;

DATA.forEach(function(sec){
  var secEl = document.createElement('div');
  secEl.className = 'major-section';
  var html = '<div class="major-title">'+sec.major+'</div>';

  sec.subs.forEach(function(sub){
    html += '<div class="sub-section">';
    html += '<div class="sub-header"><span class="sub-id">'+sub.id+'</span><span class="sub-name">'+sub.name+'</span></div>';
    html += '<table class="doc-table"><thead><tr>'
          + '<th style="width:35%">文件名稱</th>'
          + '<th style="width:28%">負責人員</th>'
          + '<th style="width:14%">文件類型</th>'
          + '<th>工具</th>'
          + '</tr></thead><tbody>';

    sub.docs.forEach(function(doc){
      var persons = doc.person && doc.person!=='—'
        ? doc.person.split('/').map(function(x){return x.trim();})
        : [];
      var dataAttr = persons.length ? ' data-persons="'+persons.join(',').toLowerCase()+'"' : '';

      totalDocs++;
      if(doc.type==='需制式範本') totalTemplate++;
      else if(doc.type==='既有公文') totalDoc++;
      else if(doc.type==='照片佐證') totalPhoto++;
      if(doc.module) totalModule++;

      html += '<tr'+dataAttr+'>'
            + '<td class="doc-name">'+doc.name+'</td>'
            + '<td>'+personTags(doc.person)+'</td>'
            + '<td>'+typeBadge(doc.type)+'</td>'
            + '<td>'+modBtn(doc.module)+'</td>'
            + '</tr>';
    });

    html += '</tbody></table></div>';
  });

  secEl.innerHTML = html;
  main.appendChild(secEl);
});

document.getElementById('statTotal').textContent = totalDocs;
document.getElementById('statTemplate').textContent = totalTemplate;
document.getElementById('statDoc').textContent = totalDoc;
document.getElementById('statPhoto').textContent = totalPhoto;
document.getElementById('statModule').textContent = totalModule;

// ── Filter ──
var currentFilter = 'all';
function filterPerson(p){
  currentFilter = p;
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.classList.remove('active','all-btn','inactive');
    if(p==='all'){
      if(btn.textContent==='全部顯示') btn.classList.add('all-btn');
      else btn.classList.remove('active');
    } else {
      if(btn.textContent===p) btn.classList.add('active');
      else if(btn.textContent==='全部顯示') btn.classList.add('all-btn','inactive');
    }
  });

  document.querySelectorAll('.doc-table tbody tr').forEach(function(tr){
    if(p==='all'){
      tr.classList.remove('hidden-row');
    } else {
      var persons = (tr.getAttribute('data-persons')||'').split(',');
      var match = persons.some(function(x){ return x===p.toLowerCase(); });
      tr.classList.toggle('hidden-row', !match);
    }
  });

  // hide sub-sections where all rows hidden
  document.querySelectorAll('.sub-section').forEach(function(sec){
    var rows = sec.querySelectorAll('.doc-table tbody tr');
    var allHidden = Array.from(rows).every(function(r){ return r.classList.contains('hidden-row'); });
    sec.style.display = allHidden ? 'none' : '';
  });

  // hide major-sections where all sub-sections hidden
  document.querySelectorAll('.major-section').forEach(function(sec){
    var subs = sec.querySelectorAll('.sub-section');
    var allHidden = Array.from(subs).every(function(s){ return s.style.display==='none'; });
    sec.style.display = allHidden ? 'none' : '';
  });
}
</script>
