<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'微軟正黑體',Arial,sans-serif;font-size:13px;background:#f5f5f5;}
.wrap{max-width:1200px;margin:0 auto;padding:16px;}
h2{font-size:16px;font-weight:bold;margin-bottom:12px;color:#333;}

.toolbar{background:#fff;border:1px solid #ddd;border-radius:6px;padding:12px 16px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;}
.toolbar label{font-weight:bold;font-size:12px;color:#555;margin-right:4px;}
.toolbar input[type=text],.toolbar input[type=number]{border:1px solid #ccc;border-radius:4px;padding:4px 8px;font-size:13px;}
.toolbar input.wide{width:220px;}

.entry-card{background:#fff;border:1px solid #ddd;border-radius:6px;padding:14px 16px;margin-bottom:12px;}
.entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.entry-head b{color:#1565c0;font-size:13px;}
.entry-del{background:#e57373;color:#fff;border:none;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:12px;}
.entry-del:hover{background:#c62828;}
.entry-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.entry-field{display:flex;flex-direction:column;gap:4px;}
.entry-field.full{grid-column:1 / -1;}
.entry-field label{font-size:12px;font-weight:bold;color:#555;}
.entry-field input[type=text],.entry-field textarea{border:1px solid #ccc;border-radius:4px;padding:6px 8px;font-size:13px;font-family:inherit;}
.entry-field textarea{resize:vertical;min-height:44px;}

.img-area{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.paste-zone{flex:1;min-width:220px;min-height:60px;border:1px dashed #aaa;border-radius:4px;padding:8px 10px;font-size:12px;color:#888;cursor:text;outline:none;display:flex;align-items:center;}
.paste-zone:focus{border-color:#1565c0;background:#f0f7ff;}
.paste-zone:empty:before{content:attr(data-placeholder);}
.img-thumb-wrap{position:relative;display:none;}
.img-thumb-wrap.show{display:block;}
.img-thumb{width:120px;height:80px;object-fit:cover;border:1px solid #ccc;border-radius:4px;background:#f0f0f0;display:block;}
.img-clear{position:absolute;top:-8px;right:-8px;background:#e57373;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;line-height:20px;text-align:center;cursor:pointer;padding:0;}
.img-clear:hover{background:#c62828;}
.img-file-label{font-size:12px;color:#1565c0;cursor:pointer;text-decoration:underline;white-space:nowrap;}
.img-file-label input{display:none;}

.add-btn{background:#1565c0;color:#fff;border:none;border-radius:4px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:bold;margin-bottom:12px;}
.add-btn:hover{background:#0d47a1;}

.btn-row{display:flex;gap:8px;margin-top:12px;}
.btn{padding:8px 20px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold;}
.btn-word{background:#1565c0;color:#fff;}
.btn-word:hover{background:#0d47a1;}
.btn-pdf{background:#c62828;color:#fff;}
.btn-pdf:hover{background:#8e0000;}
.btn[disabled]{opacity:.6;cursor:not-allowed;}

.note{font-size:11px;color:#666;margin-top:8px;line-height:1.6;}
.empty-hint{color:#999;font-size:13px;padding:20px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
<h2>雲端連結頁產生器</h2>

<div class="toolbar">
  <div><label>校名</label><input type="text" id="school" class="wide" value="高雄市楠梓區右昌國小"></div>
  <div><label>學年度</label><input type="number" id="year" value="115" min="110" max="130" style="width:60px;">年</div>
</div>

<div id="entryList"></div>
<button class="add-btn" onclick="addEntry()">＋ 新增連結項目</button>

<div class="btn-row">
  <button class="btn btn-word" id="btnWord" onclick="exportWord()">下載 Word</button>
  <button class="btn btn-pdf" id="btnPdf" onclick="exportPDF()">另存成 PDF</button>
</div>
<div class="note">
使用說明：適用於評鑑平台單檔大小限制（如 5MB）而無法直接上傳的大型檔案或網站。<br>
請將完整檔案上傳至 Google 雲端硬碟，並將資料夾／檔案權限設為「知道連結的人可以檢視」，截圖可直接複製後點選下方灰框按 Ctrl+V 貼上（會自動縮放調整大小），即可產生含 QR Code 的連結頁，上傳至評鑑平台供委員點選查閱。
</div>
</div>

<script>
const NOTE_DEFAULT = '因檔案超過平台上傳限制，請點選連結或圖片至雲端硬碟審查。';
const IMG_MAX_W = 1280;
const IMG_MAX_H = 960;
const CONTENT_WIDTH_PX = 657; // A4 21cm 減去左右 1.8cm 邊界，約在 96dpi 下的內容寬度

let entries = [];
let nextId = 1;

function addEntry() {
  entries.push({ id: nextId++, title: '', url: '', note: NOTE_DEFAULT, img: null });
  renderEntryList();
}

function removeEntry(id) {
  entries = entries.filter(e => e.id !== id);
  renderEntryList();
}

function updateEntry(id, field, value) {
  const e = entries.find(e => e.id === id);
  if (e) e[field] = value;
}

function clearEntryImg(id) {
  const e = entries.find(e => e.id === id);
  if (e) e.img = null;
  renderEntryList();
}

function resizeImageDataUrl(file, maxW, maxH, quality) {
  maxW = maxW || IMG_MAX_W; maxH = maxH || IMG_MAX_H; quality = quality || 0.85;
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.naturalWidth, maxH / img.naturalHeight);
        const outW = Math.max(1, Math.round(img.naturalWidth * scale));
        const outH = Math.max(1, Math.round(img.naturalHeight * scale));
        const canvas = document.createElement('canvas');
        canvas.width = outW;
        canvas.height = outH;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, outW, outH);
        ctx.drawImage(img, 0, 0, outW, outH);
        resolve({ dataUrl: canvas.toDataURL('image/jpeg', quality), w: outW, h: outH });
      };
      img.onerror = () => reject(new Error('圖片讀取失敗'));
      img.src = ev.target.result;
    };
    reader.onerror = () => reject(new Error('檔案讀取失敗'));
    reader.readAsDataURL(file);
  });
}

function loadImageSize(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve({ w: img.naturalWidth, h: img.naturalHeight });
    img.onerror = () => resolve({ w: 56, h: 56 });
    img.src = dataUrl;
  });
}

function fitBox(natW, natH, maxW, maxH) {
  const scale = Math.min(maxW / natW, maxH / natH, 1);
  return { w: Math.max(1, Math.round(natW * scale)), h: Math.max(1, Math.round(natH * scale)) };
}

function onEntryImgChange(id, input) {
  const file = input.files[0];
  if (!file) return;
  resizeImageDataUrl(file).then(({dataUrl, w, h}) => {
    const e = entries.find(e => e.id === id);
    if (e) e.img = { dataUrl, name: file.name, w, h };
    renderEntryList();
  }).catch(err => alert('圖片處理失敗：' + err.message));
  input.value = '';
}

function onEntryPaste(id, event) {
  const cd = event.clipboardData || (event.originalEvent && event.originalEvent.clipboardData);
  if (!cd) return;
  const items = cd.items || [];
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.indexOf('image') !== -1) {
      event.preventDefault();
      const file = items[i].getAsFile();
      resizeImageDataUrl(file).then(({dataUrl, w, h}) => {
        const e = entries.find(e => e.id === id);
        if (e) e.img = { dataUrl, name: '貼上的截圖.jpg', w, h };
        renderEntryList();
      }).catch(err => alert('圖片處理失敗：' + err.message));
      return;
    }
  }
  event.preventDefault();
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderEntryList() {
  const wrap = document.getElementById('entryList');
  if (entries.length === 0) {
    wrap.innerHTML = '<div class="empty-hint">尚未新增任何連結項目，請點選下方「＋ 新增連結項目」開始建立。</div>';
    return;
  }
  wrap.innerHTML = entries.map((e, idx) => `
    <div class="entry-card">
      <div class="entry-head">
        <b>項目 ${idx+1}</b>
        <button class="entry-del" onclick="removeEntry(${e.id})">刪除</button>
      </div>
      <div class="entry-grid">
        <div class="entry-field full">
          <label>項目／檔案名稱</label>
          <input type="text" placeholder="例如：113學年度體育班課程計畫網站連結" value="${escHtml(e.title)}"
            oninput="updateEntry(${e.id},'title',this.value)">
        </div>
        <div class="entry-field full">
          <label>雲端連結網址（Google 雲端硬碟／網站連結）</label>
          <input type="text" placeholder="https://..." value="${escHtml(e.url)}"
            oninput="updateEntry(${e.id},'url',this.value)">
        </div>
        <div class="entry-field full">
          <label>代表性截圖（可直接貼上，會自動縮放大小）</label>
          <div class="img-area">
            <div class="paste-zone" contenteditable="true" data-placeholder="點此後按 Ctrl+V 貼上截圖"
              onpaste="onEntryPaste(${e.id}, event)"></div>
            <div class="img-thumb-wrap${e.img ? ' show' : ''}">
              <img class="img-thumb" src="${e.img ? e.img.dataUrl : ''}">
              <button class="img-clear" onclick="clearEntryImg(${e.id})" title="移除截圖">×</button>
            </div>
            <label class="img-file-label">或選擇檔案
              <input type="file" accept="image/*" onchange="onEntryImgChange(${e.id}, this)">
            </label>
          </div>
        </div>
        <div class="entry-field full">
          <label>提醒文字</label>
          <textarea oninput="updateEntry(${e.id},'note',this.value)">${escHtml(e.note)}</textarea>
        </div>
      </div>
    </div>
  `).join('');
}

function generateQR(text) {
  return new Promise(resolve => {
    if (!text) { resolve(''); return; }
    const div = document.createElement('div');
    div.style.cssText = 'position:absolute;left:-9999px;top:-9999px;';
    document.body.appendChild(div);
    try {
      new QRCode(div, { text, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.M });
    } catch (err) {
      document.body.removeChild(div);
      resolve('');
      return;
    }
    setTimeout(() => {
      const canvas = div.querySelector('canvas');
      const img = div.querySelector('img');
      const dataUrl = canvas ? canvas.toDataURL('image/png') : (img ? img.src : '');
      document.body.removeChild(div);
      resolve(dataUrl);
    }, 60);
  });
}

const SCREENSHOT_MAX_W = 600;
const SCREENSHOT_MAX_H = 420;

function buildHeaderTableHTML(e, school, year, logoSize) {
  const logoBox = fitBox(logoSize.w, logoSize.h, 220, 50);
  return `
  <table style="width:${CONTENT_WIDTH_PX}px;table-layout:fixed;border-collapse:collapse;">
    <colgroup><col style="width:${logoBox.w+16}px;"><col style="width:${CONTENT_WIDTH_PX-logoBox.w-16}px;"></colgroup>
    <tr>
      <td style="border-bottom:3px solid #1565c0;padding:0 10px 8px 0;vertical-align:middle;">
        <img src="${DEFAULT_LOGO_DATAURL}" width="${logoBox.w}" height="${logoBox.h}" style="width:${logoBox.w}px;height:${logoBox.h}px;display:block;">
      </td>
      <td style="border-bottom:3px solid #1565c0;padding:0 0 8px 0;vertical-align:middle;overflow:hidden;">
        <div style="font-size:11pt;color:#555;overflow-wrap:anywhere;">${escHtml(school)} ${escHtml(year)}學年度</div>
        <div style="font-size:16pt;font-weight:bold;overflow-wrap:anywhere;">${escHtml(e.title) || '(未命名項目)'}</div>
      </td>
    </tr>
  </table>`;
}

function buildEntryBodyHTML(e, qrDataUrl) {
  let imgHtml;
  if (e.img) {
    const box = fitBox(e.img.w, e.img.h, SCREENSHOT_MAX_W, SCREENSHOT_MAX_H);
    imgHtml = `<img src="${e.img.dataUrl}" width="${box.w}" height="${box.h}" style="width:${box.w}px;height:${box.h}px;">`;
  } else {
    imgHtml = `<div style="color:#999;padding:60px 0;border:1px dashed #ccc;">（尚未上傳截圖）</div>`;
  }
  const qrHtml = qrDataUrl
    ? `<img src="${qrDataUrl}" width="110" height="110" style="width:110px;height:110px;"><div style="font-size:9pt;color:#666;margin-top:4px;">掃描 QR Code</div>`
    : '';
  return `
  <div style="text-align:center;margin:20px 0;">
    ${imgHtml}
  </div>
  <table style="width:${CONTENT_WIDTH_PX}px;table-layout:fixed;margin-top:10px;">
    <colgroup><col style="width:${CONTENT_WIDTH_PX-130}px;"><col style="width:130px;"></colgroup>
    <tr>
      <td style="vertical-align:middle;overflow:hidden;">
        <div style="font-size:12pt;font-weight:bold;margin-bottom:4px;">雲端連結：</div>
        <div style="font-size:11pt;word-break:break-all;overflow-wrap:anywhere;"><a href="${e.url}">${escHtml(e.url)}</a></div>
        <div style="font-size:10pt;color:#c62828;margin-top:10px;overflow-wrap:anywhere;">${escHtml(e.note)}</div>
      </td>
      <td style="width:130px;text-align:center;">
        ${qrHtml}
      </td>
    </tr>
  </table>`;
}

function buildEntryContentHTML(e, school, year, qrDataUrl, logoSize) {
  return `<div style="margin-bottom:18px;">${buildHeaderTableHTML(e, school, year, logoSize)}</div>${buildEntryBodyHTML(e, qrDataUrl)}`;
}

function buildExportFilename(ext) {
  const titles = entries.map(e => (e.title||'').trim()).filter(Boolean);
  let base;
  if (titles.length === 0) base = '雲端連結頁';
  else if (titles.length === 1) base = titles[0];
  else base = `${titles[0]}等${titles.length}筆`;
  base = base.replace(/[\\/:*?"<>|]/g, '_');
  return `${base}.${ext}`;
}

function escXml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');
}

const WORD_FONT = '<w:rFonts w:ascii="Arial" w:eastAsia="微軟正黑體" w:hAnsi="Arial" w:cs="Arial"/>';
const PAGE_W_DXA = 11906;  // A4 21cm
const PAGE_H_DXA = 16838;  // A4 29.7cm
const MARGIN_DXA = 1021;   // 1.8cm
const CONTENT_W_DXA = PAGE_W_DXA - MARGIN_DXA * 2;

function pxToEmu(px) { return Math.round(px * EMU_PER_PX); }
function pxToDxa(px) { return Math.round(px * EMU_PER_PX / EMU_PER_DXA); }

let docxDrawId = 100;
function drawingXml(rId, wPx, hPx, name) {
  const cx = pxToEmu(wPx), cy = pxToEmu(hPx);
  const id = docxDrawId++;
  return `<w:drawing><wp:inline distT="0" distB="0" distL="0" distR="0"><wp:extent cx="${cx}" cy="${cy}"/><wp:docPr id="${id}" name="${escXml(name)}"/><a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:nvPicPr><pic:cNvPr id="${id}" name="${escXml(name)}"/><pic:cNvPicPr/></pic:nvPicPr><pic:blipFill><a:blip r:embed="${rId}"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill><pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="${cx}" cy="${cy}"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr></pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing>`;
}

function runXml(text, opts) {
  opts = opts || {};
  const bold = opts.bold ? '<w:b/>' : '';
  const sz = opts.sz ? `<w:sz w:val="${opts.sz}"/><w:szCs w:val="${opts.sz}"/>` : '';
  const color = opts.color ? `<w:color w:val="${opts.color}"/>` : '';
  return `<w:r><w:rPr>${WORD_FONT}${bold}${sz}${color}</w:rPr><w:t xml:space="preserve">${escXml(text)}</w:t></w:r>`;
}

function hyperlinkRunXml(rId, text, opts) {
  opts = opts || {};
  const sz = opts.sz ? `<w:sz w:val="${opts.sz}"/><w:szCs w:val="${opts.sz}"/>` : '';
  return `<w:hyperlink r:id="${rId}" w:history="1"><w:r><w:rPr>${WORD_FONT}<w:color w:val="1565C0"/><w:u w:val="single"/>${sz}</w:rPr><w:t xml:space="preserve">${escXml(text)}</w:t></w:r></w:hyperlink>`;
}

function paraXml(runsXml, opts) {
  opts = opts || {};
  const jc = opts.jc ? `<w:jc w:val="${opts.jc}"/>` : '';
  const spacing = opts.spacingAfter !== undefined ? `<w:spacing w:after="${opts.spacingAfter}"/>` : '';
  return `<w:p><w:pPr>${spacing}${jc}</w:pPr>${runsXml}</w:p>`;
}

const TC_BORDER_NONE = '<w:tcBorders><w:top w:val="none"/><w:left w:val="none"/><w:right w:val="none"/><w:bottom w:val="none"/></w:tcBorders>';
const TBL_BORDER_NONE = '<w:tblBorders><w:top w:val="none"/><w:left w:val="none"/><w:right w:val="none"/><w:bottom w:val="none"/><w:insideH w:val="none"/><w:insideV w:val="none"/></w:tblBorders>';

function makeHeaderXmlDocx(e, school, year, logoRid, logoBox) {
  const logoDxa = pxToDxa(logoBox.w) + 200;
  const titleDxa = CONTENT_W_DXA - logoDxa;
  const tcBottomBorder = '<w:tcBorders><w:top w:val="none"/><w:left w:val="none"/><w:right w:val="none"/><w:bottom w:val="single" w:sz="18" w:space="4" w:color="1565C0"/></w:tcBorders>';
  const logoCell = `<w:tc><w:tcPr><w:tcW w:w="${logoDxa}" w:type="dxa"/><w:vAlign w:val="center"/>${tcBottomBorder}</w:tcPr>`
    + `<w:p><w:pPr><w:spacing w:after="0"/></w:pPr><w:r>${drawingXml(logoRid, logoBox.w, logoBox.h, 'logo')}</w:r></w:p></w:tc>`;
  const titleCell = `<w:tc><w:tcPr><w:tcW w:w="${titleDxa}" w:type="dxa"/><w:vAlign w:val="center"/>${tcBottomBorder}</w:tcPr>`
    + paraXml(runXml(`${school} ${year}學年度`, {sz:22, color:'555555'}), {spacingAfter:0})
    + paraXml(runXml(e.title || '(未命名項目)', {bold:true, sz:32}), {spacingAfter:0})
    + `</w:tc>`;
  const tbl = `<w:tbl><w:tblPr><w:tblW w:w="${CONTENT_W_DXA}" w:type="dxa"/>${TBL_BORDER_NONE}<w:tblLayout w:type="fixed"/></w:tblPr>`
    + `<w:tblGrid><w:gridCol w:w="${logoDxa}"/><w:gridCol w:w="${titleDxa}"/></w:tblGrid><w:tr>${logoCell}${titleCell}</w:tr></w:tbl>`;
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:hdr`
    + ` xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"`
    + ` xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"`
    + ` xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"`
    + ` xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"`
    + ` xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">${tbl}<w:p/></w:hdr>`;
}

function makeBodyXmlDocx(e, imgRid, imgBox, qrRid, urlRid) {
  const imgPara = imgRid
    ? paraXml(`<w:r>${drawingXml(imgRid, imgBox.w, imgBox.h, 'screenshot')}</w:r>`, {jc:'center', spacingAfter:200})
    : paraXml(runXml('（尚未上傳截圖）', {color:'999999'}), {jc:'center', spacingAfter:200});

  const qrColDxa = 1950;
  const linkColDxa = CONTENT_W_DXA - qrColDxa;
  const linkCell = `<w:tc><w:tcPr><w:tcW w:w="${linkColDxa}" w:type="dxa"/><w:vAlign w:val="center"/>${TC_BORDER_NONE}</w:tcPr>`
    + paraXml(runXml('雲端連結：', {bold:true, sz:24}), {spacingAfter:80})
    + paraXml(e.url ? hyperlinkRunXml(urlRid, e.url, {sz:22}) : runXml('', {}), {spacingAfter:160})
    + paraXml(runXml(e.note||'', {color:'C62828', sz:20}), {spacingAfter:0})
    + `</w:tc>`;
  const qrCell = `<w:tc><w:tcPr><w:tcW w:w="${qrColDxa}" w:type="dxa"/><w:vAlign w:val="center"/>${TC_BORDER_NONE}</w:tcPr>`
    + (qrRid
      ? paraXml(`<w:r>${drawingXml(qrRid, 110, 110, 'qr')}</w:r>`, {jc:'center', spacingAfter:60}) + paraXml(runXml('掃描 QR Code', {sz:16, color:'666666'}), {jc:'center', spacingAfter:0})
      : paraXml('', {jc:'center'}))
    + `</w:tc>`;
  const tbl = `<w:tbl><w:tblPr><w:tblW w:w="${CONTENT_W_DXA}" w:type="dxa"/>${TBL_BORDER_NONE}<w:tblLayout w:type="fixed"/></w:tblPr>`
    + `<w:tblGrid><w:gridCol w:w="${linkColDxa}"/><w:gridCol w:w="${qrColDxa}"/></w:tblGrid><w:tr>${linkCell}${qrCell}</w:tr></w:tbl>`;
  return imgPara + tbl;
}

function dataUrlToBase64(dataUrl) {
  return dataUrl.split(',')[1];
}

function extFromDataUrl(dataUrl) {
  const m = /^data:image\/(png|jpeg|jpg)/.exec(dataUrl);
  return m ? (m[1] === 'jpg' ? 'jpeg' : m[1]) : 'png';
}

async function exportWord() {
  if (entries.length === 0) { alert('請先新增至少一筆連結項目。'); return; }
  const school = document.getElementById('school').value || '';
  const year = document.getElementById('year').value || '';
  const logoSize = await loadImageSize(DEFAULT_LOGO_DATAURL);
  const logoBox = fitBox(logoSize.w, logoSize.h, 220, 50);
  const logoExt = extFromDataUrl(DEFAULT_LOGO_DATAURL);

  const media = []; // {name, base64}
  const docRels = []; // {id, type, target, external}
  let ridCounter = 1;
  const nextRid = () => `rId${ridCounter++}`;

  const stylesRid = nextRid();
  docRels.push({ id: stylesRid, type: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles', target: 'styles.xml' });

  const headerFiles = []; // {name, xml, relsXml}
  const bodyParts = [];

  media.push({ name: `logo.${logoExt}`, base64: dataUrlToBase64(DEFAULT_LOGO_DATAURL) });

  for (let i = 0; i < entries.length; i++) {
    const e = entries[i];
    const headerName = `header${i+1}.xml`;
    const headerLogoRid = 'rId1'; // 每個 header part 的 rels 各自獨立編號
    const headerXml = makeHeaderXmlDocx(e, school, year, headerLogoRid, logoBox);
    const headerRelsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="${headerLogoRid}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/image" Target="media/logo.${logoExt}"/></Relationships>`;
    headerFiles.push({ name: headerName, xml: headerXml, relsXml: headerRelsXml });

    const docHeaderRid = nextRid();
    docRels.push({ id: docHeaderRid, type: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/header', target: headerName });

    let imgRid = null, imgBox = null;
    if (e.img) {
      imgBox = fitBox(e.img.w, e.img.h, SCREENSHOT_MAX_W, SCREENSHOT_MAX_H);
      const ext = extFromDataUrl(e.img.dataUrl);
      const name = `image_${i+1}.${ext}`;
      media.push({ name, base64: dataUrlToBase64(e.img.dataUrl) });
      imgRid = nextRid();
      docRels.push({ id: imgRid, type: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/image', target: `media/${name}` });
    }

    let qrRid = null;
    if (e.url) {
      const qrDataUrl = await generateQR(e.url);
      if (qrDataUrl) {
        const name = `qr_${i+1}.png`;
        media.push({ name, base64: dataUrlToBase64(qrDataUrl) });
        qrRid = nextRid();
        docRels.push({ id: qrRid, type: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/image', target: `media/${name}` });
      }
    }

    let urlRid = null;
    if (e.url) {
      urlRid = nextRid();
      docRels.push({ id: urlRid, type: 'http://schemas.openxmlformats.org/officeDocument/2006/relationships/hyperlink', target: e.url, external: true });
    }

    bodyParts.push(makeBodyXmlDocx(e, imgRid, imgBox, qrRid, urlRid));

    const sectPr = `<w:sectPr><w:headerReference w:type="default" r:id="${docHeaderRid}"/>`
      + `<w:pgSz w:w="${PAGE_W_DXA}" w:h="${PAGE_H_DXA}"/>`
      + `<w:pgMar w:top="1474" w:right="${MARGIN_DXA}" w:bottom="${MARGIN_DXA}" w:left="${MARGIN_DXA}" w:header="397" w:footer="397" w:gutter="0"/>`
      + `</w:sectPr>`;
    if (i < entries.length - 1) {
      bodyParts.push(`<w:p><w:pPr>${sectPr}</w:pPr></w:p>`);
    } else {
      bodyParts.push(sectPr);
    }
  }

  const documentXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    + '<w:document xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"'
    + ' xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"'
    + ' xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"'
    + ' xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"'
    + ' xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture">'
    + '<w:body>' + bodyParts.join('') + '</w:body></w:document>';

  const docRelsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    + docRels.map(r => `<Relationship Id="${r.id}" Type="${r.type}" Target="${escXml(r.target)}"${r.external ? ' TargetMode="External"' : ''}/>`).join('')
    + '</Relationships>';

  const stylesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr>'
    + WORD_FONT + '<w:sz w:val="22"/><w:szCs w:val="22"/></w:rPr></w:rPrDefault></w:docDefaults></w:styles>';

  const headerOverrides = headerFiles.map((h, i) => `<Override PartName="/word/${h.name}" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.header+xml"/>`).join('');
  const contentTypesXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
    + '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>'
    + '<Default Extension="xml" ContentType="application/xml"/>'
    + '<Default Extension="jpeg" ContentType="image/jpeg"/><Default Extension="png" ContentType="image/png"/>'
    + '<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>'
    + '<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>'
    + headerOverrides + '</Types>';

  const rootRelsXml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    + '<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>';

  const zip = new JSZip();
  zip.file('[Content_Types].xml', contentTypesXml);
  zip.file('_rels/.rels', rootRelsXml);
  zip.file('word/document.xml', documentXml);
  zip.file('word/_rels/document.xml.rels', docRelsXml);
  zip.file('word/styles.xml', stylesXml);
  headerFiles.forEach(h => {
    zip.file(`word/${h.name}`, h.xml);
    zip.file(`word/_rels/${h.name}.rels`, h.relsXml);
  });
  media.forEach(m => zip.file(`word/media/${m.name}`, m.base64, { base64: true }));

  const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' });
  saveAs(blob, buildExportFilename('docx'));
}

function waitImagesLoaded(container) {
  const imgs = Array.from(container.querySelectorAll('img'));
  return Promise.all(imgs.map(img => img.complete ? Promise.resolve() :
    new Promise(res => { img.onload = res; img.onerror = res; })));
}

async function exportPDF() {
  if (entries.length === 0) { alert('請先新增至少一筆連結項目。'); return; }
  const btn = document.getElementById('btnPdf');
  btn.disabled = true;
  btn.textContent = '產生中…';
  try {
    const school = document.getElementById('school').value || '';
    const year = document.getElementById('year').value || '';
    const logoSize = await loadImageSize(DEFAULT_LOGO_DATAURL);
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    const pageW = 210, pageH = 297;

    // 用獨立 iframe 承載渲染內容，避免其他模組的全域 CSS（如 !important 的 table 樣式）滲入影響版面
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'position:fixed;left:-9999px;top:0;width:793px;height:1123px;border:0;';
    document.body.appendChild(iframe);
    const idoc = iframe.contentDocument;
    idoc.open();
    idoc.write('<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body style="margin:0;"></body></html>');
    idoc.close();
    const stage = idoc.createElement('div');
    stage.style.cssText = 'width:793px;padding:68px;background:#fff;font-family:"微軟正黑體",Arial,sans-serif;box-sizing:border-box;';
    idoc.body.appendChild(stage);

    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      const qrDataUrl = await generateQR(e.url);
      stage.innerHTML = buildEntryContentHTML(e, school, year, qrDataUrl, logoSize);
      await waitImagesLoaded(stage);
      const canvas = await html2canvas(stage, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      const imgH = Math.min(pageH, pageW * canvas.height / canvas.width);
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, pageW, imgH);

      // 圖片是整頁截圖（無法點擊），另外疊加一個透明可點擊區塊還原超連結
      if (e.url) {
        const linkEl = stage.querySelector('a[href]');
        if (linkEl) {
          const stageRect = stage.getBoundingClientRect();
          const linkRect = linkEl.getBoundingClientRect();
          const mmPerPx = pageW / stageRect.width;
          const x = (linkRect.left - stageRect.left) * mmPerPx;
          const y = (linkRect.top - stageRect.top) * mmPerPx;
          const w = linkRect.width * mmPerPx;
          const h = linkRect.height * mmPerPx;
          pdf.link(x, y, w, h, { url: e.url });
        }
      }
    }
    document.body.removeChild(iframe);
    pdf.save(buildExportFilename('pdf'));
  } catch (err) {
    alert('PDF 產生失敗：' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '另存成 PDF';
  }
}
